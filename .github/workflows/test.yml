name: test
on:
  push:
  pull_request:
jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y bats stow
      - run: bats tests/theme-switch.bats tests/hooks
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/integration/run.sh

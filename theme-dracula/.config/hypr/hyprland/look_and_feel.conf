general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  col.active_border = rgba(bd93f9ee) rgba(ff79c6ee) 45deg
  col.inactive_border = rgba(44475aaa)
  resize_on_border = false
  allow_tearing = false
  layout = dwindle
}
decoration {
  rounding = 4
  rounding_power = 2
  active_opacity = 0.92
  inactive_opacity = 0.88

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(282a36ee)
  }

  blur {
    enabled = true
    size = 10
    passes = 2
    vibrancy = 0.12
  }
}
